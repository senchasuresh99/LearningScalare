<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Reset Password | PawnSecure</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">
    <div class="bg-white w-full max-w-md p-6 rounded-xl shadow-xl">
      <!-- ✅ Logo -->
      <div class="flex justify-center mb-4">
        <img
          src="https://github.com/senchasuresh99/LearningScalare/blob/main/logo3.png?raw=true"
          alt="PawnSecure Logo"
          class="h-20 object-contain"
        />
      </div>

      <h2 class="text-2xl font-bold text-gray-800 text-center mb-2">
        Reset Password
      </h2>

      <p class="text-sm text-gray-600 text-center mb-6">
        Enter your new password below
      </p>

      <!-- Hidden token -->
      <input id="token" type="hidden" />

      <!-- New Password -->
      <div class="mb-4">
        <label class="block text-sm font-semibold text-gray-600 mb-1">
          New Password
        </label>
        <input
          id="newPassword"
          type="password"
          placeholder="Enter new password"
          class="w-full border px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
        />
      </div>

      <!-- Confirm Password -->
      <div class="mb-5">
        <label class="block text-sm font-semibold text-gray-600 mb-1">
          Confirm Password
        </label>
        <input
          id="confirmPassword"
          type="password"
          placeholder="Confirm new password"
          class="w-full border px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
        />
      </div>

      <!-- Submit -->
      <button
        onclick="resetPassword()"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-lg font-bold transition"
      >
        Reset Password
      </button>

      <!-- Message -->
      <p id="message" class="text-center text-sm mt-4 font-semibold"></p>
    </div>

    <script>
      // ✅ CHANGE IF NEEDED
      const API_BASE = "http://localhost:8080";

      // ✅ Read token from URL
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      if (!token) {
        showMessage("Invalid or missing reset token", true);
      } else {
        document.getElementById("token").value = token;
      }

      async function resetPassword() {
        const token = document.getElementById("token").value;
        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;

        if (!newPassword || !confirmPassword) {
          showMessage("All fields are required", true);
          return;
        }

        if (newPassword !== confirmPassword) {
          showMessage("Passwords do not match", true);
          return;
        }

        try {
          const res = await fetch(`${API_BASE}/auth/reset-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              token: token,
              newPassword: newPassword,
            }),
          });

          const text = await res.text();

          if (!res.ok) {
            showMessage(text || "Password reset failed", true);
            return;
          }

          showMessage(
            "Password reset successful. Redirecting to login…",
            false,
          );

          // ✅ Redirect back to login
          setTimeout(() => {
            window.location.href = "index.html";
          }, 2000);
        } catch (err) {
          showMessage("Something went wrong. Please try again.", true);
        }
      }

      function showMessage(msg, isError) {
        const el = document.getElementById("message");
        el.textContent = msg;
        el.className =
          "text-center text-sm mt-4 font-semibold " +
          (isError ? "text-red-600" : "text-green-600");
      }
    </script>
  </body>
</html>
