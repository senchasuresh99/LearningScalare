spring.application.name=APIgateway
server.port = 9090
eureka.client.register-with-eureka = true
eureka.client.fetch-registry = true
eureka.client.service-url.defaultZone = http://localhost:8761/eureka

spring.cloud.gateway.routes[0].id=productserviceconfig
spring.cloud.gateway.routes[0].predicates[0]=Path=/products/*
spring.cloud.gateway.routes[0].uri=lb://PRODUCTSERVICE


spring.cloud.gateway.routes[1].id=userserviceconfig
spring.cloud.gateway.routes[1].predicates[0]=Path=/auth/*
spring.cloud.gateway.routes[1].uri=lb://USERAUTHSERVICE

spring.cloud.gateway.routes[2].id=paymentserviceconfig
spring.cloud.gateway.routes[2].predicates[0]=Path=/payments/*
spring.cloud.gateway.routes[2].uri=lb://PAYMENTSERVICE